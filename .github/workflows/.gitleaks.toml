title = "Gitleaks Config"

[allowlist]
paths = [
  '''^\.gitleaks\.toml$''',
  '''^\.betterleaks\.toml$'''
]

[[rules]]
id = "generic-api-key"
description = "Detect high-entropy generic API keys"
# Step 1: Capture keys using Regex
regex = '''(?i)(api[_-]?key|secret|token)\s*[:=]\s*["']?([a-zA-Z0-9_-]{16,64})["']?'''
secretGroup = 2
# Step 2: Apply Entropy Threshold (Scale 0.0 - 8.0, standard cutoff is >= 3.5)
entropy = 3.5

[[rules]]
id = "custom-internal-key"
description = "Detect internal system keys"
regex = '''(?i)(custom_key)\s*[:=]\s*["']?([a-zA-Z0-9]{20,})["']?'''
secretGroup = 2
entropy = 3.2
