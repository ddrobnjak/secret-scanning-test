name: Secret Scan Comparison

on:
  push:
    branches: [ "main" ]

jobs:
  gitleaks:
    if: github.actor == github.repository_owner
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks git --log-opts="--all" --config=.gitleaks.toml -v
          
  betterleaks:
    if: github.actor == github.repository_owner
    name: Betterleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dortort/betterleaks-action@v0.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Pass custom path for Betterleaks configuration here:
          config: '.betterleaks.toml'
