name: Secret Scanning

on:
  push:
    branches: [ "main" ]
    
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Fetch full Git history (Required for scanning full commit history)
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Step 2: Official Gitleaks Action
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      # Step 3: Native Betterleaks Action
      - name: Run Betterleaks
        uses: dortort/betterleaks-action@v0.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: .betterleaks.toml
          scan-mode: git
          fail-on-leak: true
