name: Secret Scan Comparison

on:
  push:
    branches: [ "main" ]

jobs:
  gitleaks:
    if: github.actor == github.repository_owner
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Uses official container to scan ALL commits on ALL branches
      - name: Run Gitleaks (Full History)
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: git --log-opts="--all" --config=.gitleaks.toml -v
          
  betterleaks:
    if: github.actor == github.repository_owner
    name: Betterleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dortort/betterleaks-action@v0.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Pass custom path for Betterleaks configuration here:
          config: '.betterleaks.toml'
